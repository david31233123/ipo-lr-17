{% extends 'shop/base.html' %}

{% block title %}Настройки профиля{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm p-4">
                <h2 class="mb-4">Настройки профиля</h2>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Имя пользователя</label>
                        <input type="text" class="form-control" value="{{ user.username }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="{{ user.email }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="full_name">ФИО</label>
                        <input id="full_name" name="full_name" type="text" class="form-control" value="{{ user.profile.full_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="phone">Телефон</label>
                        <input id="phone" name="phone" type="text" class="form-control" value="{{ user.profile.phone }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="address">Адрес доставки</label>
                        <textarea id="address" name="address" rows="2" class="form-control">{{ user.profile.address }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label" for="city">Город</label>
                            <input id="city" name="city" type="text" class="form-control" value="{{ user.profile.city }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label" for="postal_code">Почтовый индекс</label>
                            <input id="postal_code" name="postal_code" type="text" class="form-control" value="{{ user.profile.postal_code }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label" for="favorite_category">Любимая категория</label>
                            <input id="favorite_category" name="favorite_category" type="text" class="form-control" value="{{ user.profile.favorite_category }}" readonly>
                            <small class="text-muted">Чтобы изменить категорию, обратитесь к администратору.</small>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    <a href="{% url 'profile' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
