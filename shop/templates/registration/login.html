{% extends 'shop/base.html' %}

{% block title %}Вход - Игровой Мир{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card">
                <div class="card-header text-center">
                    <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Вход</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Имя пользователя</label>
                            <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="id_password" class="form-label">Пароль</label>
                            <input type="password" name="password" id="id_password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right"></i> Войти
                        </button>
                    </form>
                    {% if form.errors %}
                        <div class="alert alert-danger mt-3">
                            Неверное имя пользователя или пароль
                        </div>
                    {% endif %}
                </div>
                <div class="card-footer text-center">
                    <small>
                        Нет аккаунта? <a href="{% url 'admin:index' %}">Обратитесь к администратору</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
